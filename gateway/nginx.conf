worker_processes 1;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
  }

  limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=3r/s;
  limit_req_zone $binary_remote_addr zone=api_checkout:10m rate=5r/s;

  limit_req_status 429;
  limit_req_log_level warn;

  server {
    listen 8080;
    server_name _;
    add_header X-Request-Id $req_id always;
    # Microservices can be slow on first DB touch; tight timeouts produced 502 from nginx.
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    location = /_auth {
      internal;
      proxy_pass http://user-service:8001/api/users/verify-token;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-Request-Id $req_id;
    }

    location = / {
      default_type text/html;
      return 200 '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BitForge Gateway</title><style>body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#0b1220,#1f3b73,#7c3aed,#06b6d4);min-height:100vh;color:#fff}.wrap{max-width:980px;margin:0 auto;padding:36px}.card{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.28);border-radius:16px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.25)}h1{margin:0 0 8px;font-size:38px}.sub{opacity:.9;margin:0 0 18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:16px}.tile{background:rgba(255,255,255,.1);padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.2)}.ok{color:#86efac;font-weight:700}.warn{color:#fde68a;font-weight:700}a{color:#fff}code{background:rgba(0,0,0,.25);padding:2px 6px;border-radius:6px}</style></head><body><div class="wrap"><div class="card"><h1>BitForge Gateway</h1><p class="sub">Color status page for humans. Probe endpoints remain JSON.</p><p><strong>Live:</strong> <span class="ok" id="live">checking...</span> &nbsp;|&nbsp; <strong>Ready:</strong> <span id="ready">checking...</span> &nbsp;|&nbsp; <strong>Request ID:</strong> <code id="rid">-</code></p><div class="grid"><div class="tile">Gateway Health<br><a href="/health">/health</a></div><div class="tile">Detailed Health<br><a href="/health/details">/health/details</a></div><div class="tile">Jaeger<br><a href="http://localhost:16686" target="_blank">open</a></div><div class="tile">Prometheus<br><a href="http://localhost:9090" target="_blank">open</a></div><div class="tile">Grafana<br><a href="http://localhost:3000" target="_blank">open</a></div></div></div></div><script>const j=u=>fetch(u).then(r=>{const rid=r.headers.get("x-request-id");if(rid)document.getElementById("rid").textContent=rid;return r.json()});Promise.all([j("/health/live"),j("/health/ready")]).then(([l,r])=>{document.getElementById("live").textContent=l.status;document.getElementById("ready").textContent=r.ready?"ready":"degraded";document.getElementById("ready").className=r.ready?"ok":"warn";}).catch(()=>{document.getElementById("live").textContent="error";document.getElementById("ready").textContent="error";document.getElementById("ready").className="warn";});</script></body></html>';
    }

    location /api/users {
      limit_req zone=api_auth burst=6 nodelay;
      auth_request /_auth;
      auth_request_set $auth_user_id $upstream_http_x_user_id;
      auth_request_set $auth_user_email $upstream_http_x_user_email;
      auth_request_set $auth_user_name $upstream_http_x_user_name;
      auth_request_set $auth_user_admin $upstream_http_x_user_admin;
      proxy_pass http://user-service:8001/api/users;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Email $auth_user_email;
      proxy_set_header X-User-Name $auth_user_name;
      proxy_set_header X-User-Admin $auth_user_admin;
      proxy_set_header X-Request-Id $req_id;
    }

    location = /api/users/login {
      limit_req zone=api_auth burst=6 nodelay;
      proxy_pass http://user-service:8001/api/users/login;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-Id $req_id;
    }

    location = /api/users/register {
      limit_req zone=api_auth burst=6 nodelay;
      proxy_pass http://user-service:8001/api/users/register;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-Id $req_id;
    }

    location = /api/users/verify-token {
      return 404;
    }

    location ^~ /api/products/internal/ {
      return 403;
    }

    location /api/products {
      limit_req zone=api_general burst=20 nodelay;
      proxy_pass http://product-service:8002/api/products;
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-Request-Id $req_id;
    }

    location /api/cart {
      limit_req zone=api_general burst=20 nodelay;
      auth_request /_auth;
      auth_request_set $auth_user_id $upstream_http_x_user_id;
      auth_request_set $auth_user_email $upstream_http_x_user_email;
      auth_request_set $auth_user_name $upstream_http_x_user_name;
      auth_request_set $auth_user_admin $upstream_http_x_user_admin;
      proxy_pass http://cart-service:8006/api/cart;
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Email $auth_user_email;
      proxy_set_header X-User-Name $auth_user_name;
      proxy_set_header X-User-Admin $auth_user_admin;
      proxy_set_header X-Request-Id $req_id;
    }

    location ~ ^/api/orders/.*/(pay|cancel)$ {
      return 403;
    }

    location /api/orders {
      limit_req zone=api_checkout burst=10 nodelay;
      auth_request /_auth;
      auth_request_set $auth_user_id $upstream_http_x_user_id;
      auth_request_set $auth_user_email $upstream_http_x_user_email;
      auth_request_set $auth_user_name $upstream_http_x_user_name;
      auth_request_set $auth_user_admin $upstream_http_x_user_admin;
      proxy_pass http://order-service:8003/api/orders;
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Email $auth_user_email;
      proxy_set_header X-User-Name $auth_user_name;
      proxy_set_header X-User-Admin $auth_user_admin;
      proxy_set_header Idempotency-Key $http_idempotency_key;
      proxy_set_header X-Request-Id $req_id;
    }

    location /api/payments {
      limit_req zone=api_checkout burst=10 nodelay;
      auth_request /_auth;
      auth_request_set $auth_user_id $upstream_http_x_user_id;
      auth_request_set $auth_user_email $upstream_http_x_user_email;
      auth_request_set $auth_user_name $upstream_http_x_user_name;
      auth_request_set $auth_user_admin $upstream_http_x_user_admin;
      proxy_pass http://payment-service:8004/api/payments;
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Email $auth_user_email;
      proxy_set_header X-User-Name $auth_user_name;
      proxy_set_header X-User-Admin $auth_user_admin;
      proxy_set_header Idempotency-Key $http_idempotency_key;
      proxy_set_header X-Request-Id $req_id;
    }

    location /api/reviews {
      limit_req zone=api_general burst=20 nodelay;
      proxy_pass http://review-service:8007/api/reviews;
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-Request-Id $req_id;
    }

    location /api/forum {
      limit_req zone=api_general burst=20 nodelay;
      proxy_pass http://forum-service:8005/api/forum;
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-Request-Id $req_id;
    }

    location /nginx_status {
      stub_status;
      access_log off;
      allow all;
    }

    location = /health {
      default_type application/json;
      return 200 '{"status":"ok","gateway":"nginx"}';
    }

    location = /health/live {
      default_type application/json;
      return 200 '{"status":"ok","gateway":"nginx","live":true}';
    }

    location = /health/ready {
      default_type application/json;
      return 200 '{"status":"ok","gateway":"nginx","ready":true,"check":"Use /health/upstream/{user|product|order|payment|cart|review|forum} for per-service readiness"}';
    }

    location = /health/details {
      default_type application/json;
      return 200 '{"status":"ok","gateway":"nginx","version":"1.0.0","live":true,"ready":true,"timestamp":"$time_iso8601","requestId":"$req_id","upstreamChecks":{"user":"/health/upstream/user","product":"/health/upstream/product","order":"/health/upstream/order","payment":"/health/upstream/payment","cart":"/health/upstream/cart","review":"/health/upstream/review","forum":"/health/upstream/forum"}}';
    }

    location = /health/upstream/user {
      proxy_pass http://user-service:8001/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }
    location = /health/upstream/product {
      proxy_pass http://product-service:8002/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }
    location = /health/upstream/order {
      proxy_pass http://order-service:8003/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }
    location = /health/upstream/payment {
      proxy_pass http://payment-service:8004/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }
    location = /health/upstream/cart {
      proxy_pass http://cart-service:8006/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }
    location = /health/upstream/review {
      proxy_pass http://review-service:8007/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }
    location = /health/upstream/forum {
      proxy_pass http://forum-service:8005/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }

    location /docs/user {
      proxy_pass http://user-service:8001/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }
    location /docs/product {
      proxy_pass http://product-service:8002/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }
    location /docs/order {
      proxy_pass http://order-service:8003/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }
    location /docs/payment {
      proxy_pass http://payment-service:8004/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }
    location /docs/forum {
      proxy_pass http://forum-service:8005/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }
    location /docs/cart {
      proxy_pass http://cart-service:8006/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }
    location /docs/review {
      proxy_pass http://review-service:8007/health;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $req_id;
    }
  }
}
