version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.micro
    command: npm run micro:user
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "5001:5001"
    depends_on:
      - redis

  product-service:
    build:
      context: .
      dockerfile: Dockerfile.micro
    command: npm run micro:product
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "5002:5002"
    depends_on:
      - redis

  cart-service:
    build:
      context: .
      dockerfile: Dockerfile.micro
    command: npm run micro:cart
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "5003:5003"
    depends_on:
      - redis

  order-service:
    build:
      context: .
      dockerfile: Dockerfile.micro
    command: npm run micro:order
    env_file:
      - .env
    ports:
      - "5004:5004"
    depends_on:
      - product-service
      - payment-service

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.micro
    command: npm run micro:payment
    env_file:
      - .env
    ports:
      - "5005:5005"

  review-service:
    build:
      context: .
      dockerfile: Dockerfile.micro
    command: npm run micro:review
    env_file:
      - .env
    ports:
      - "5006:5006"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.micro
    command: npm run micro:gateway
    env_file:
      - .env
    environment:
      USER_SERVICE_URL: http://user-service:5001
      PRODUCT_SERVICE_URL: http://product-service:5002
      CART_SERVICE_URL: http://cart-service:5003
      ORDER_SERVICE_URL: http://order-service:5004
      PAYMENT_SERVICE_URL: http://payment-service:5005
      REVIEW_SERVICE_URL: http://review-service:5006
    ports:
      - "9000:9000"
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - review-service

volumes:
  redis_data:
