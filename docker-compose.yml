services:
  cadvisor:
    image: gcr.io/google-containers/cadvisor:latest
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    # Host 6380 avoids clashing with another Redis (or an old compose stack) on 6379.
    # Services still use redis:6379 on the Docker network.
    ports:
      - "6380:6379"

  jaeger:
    image: jaegertracing/all-in-one:1.54
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      # UI only; OTLP stays internal — otel-collector uses jaeger:4317 on the compose network.
      - "16686:16686"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    volumes:
      - ./infra/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  user-service:
    build: ./microservices/user-service
    environment:
      MONGO_URI: mongodb://mongo:27017/UserDB
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      SERVICE_TOKEN: ${SERVICE_TOKEN:-dev-internal-token}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8001/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 90s
    depends_on:
      mongo:
        condition: service_healthy
      otel-collector:
        condition: service_started

  product-service:
    build: ./microservices/product-service
    environment:
      MONGO_URI: mongodb://mongo:27017/ProductDB
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      SERVICE_TOKEN: ${SERVICE_TOKEN:-dev-internal-token}
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8002/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 90s
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
      otel-collector:
        condition: service_started

  cart-service:
    build: ./microservices/cart-service
    environment:
      MONGO_URI: mongodb://mongo:27017/CartDB
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8006/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 90s
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
      otel-collector:
        condition: service_started

  order-service:
    build: ./microservices/order-service
    environment:
      MONGO_URI: mongodb://mongo:27017/OrderDB
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      PRODUCT_SERVICE_URL: http://product-service:8002
      PAYMENT_SERVICE_URL: http://payment-service:8004
      SERVICE_TOKEN: ${SERVICE_TOKEN:-dev-internal-token}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8003/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 90s
    depends_on:
      mongo:
        condition: service_healthy
      product-service:
        condition: service_healthy
      otel-collector:
        condition: service_started

  payment-service:
    build: ./microservices/payment-service
    environment:
      MONGO_URI: mongodb://mongo:27017/PaymentDB
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ORDER_SERVICE_URL: http://order-service:8003
      SERVICE_TOKEN: ${SERVICE_TOKEN:-dev-internal-token}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8004/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 90s
    depends_on:
      mongo:
        condition: service_healthy
      order-service:
        condition: service_healthy
      otel-collector:
        condition: service_started

  review-service:
    build: ./microservices/review-service
    environment:
      MONGO_URI: mongodb://mongo:27017/ReviewDB
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8007/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 90s
    depends_on:
      mongo:
        condition: service_healthy
      otel-collector:
        condition: service_started

  forum-service:
    build: ./microservices/forum-service
    environment:
      MONGO_URI: mongodb://mongo:27017/ForumDB
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8005/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 90s
    depends_on:
      mongo:
        condition: service_healthy
      otel-collector:
        condition: service_started

  gateway:
    image: nginx:1.25-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
      forum-service:
        condition: service_healthy

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    command:
      - -nginx.scrape-uri=http://gateway:8080/nginx_status
    ports:
      - "9113:9113"
    depends_on:
      - gateway

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - nginx-exporter
      - user-service
      - product-service
      - order-service
      - payment-service
      - cart-service
      - review-service
      - forum-service

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./infra/grafana/provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  mongodata:
  grafanadata:
