# Repository layout: docker-compose.yml and frontend/ live at repo root (not maker-platform/).
name: Maker Platform CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install user-service dependencies
        run: npm ci
        working-directory: microservices/user-service
      - name: Install product-service dependencies
        run: npm ci
        working-directory: microservices/product-service
      - name: Install order-service dependencies
        run: npm ci
        working-directory: microservices/order-service
      - name: Install payment-service dependencies
        run: npm ci
        working-directory: microservices/payment-service
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Run user-service unit tests
        run: npm test
        working-directory: microservices/user-service
      - name: Run product-service unit tests
        run: npm test
        working-directory: microservices/product-service
      - name: Run order-service unit tests
        run: npm test
        working-directory: microservices/order-service
      - name: Run payment-service unit tests
        run: npm test
        working-directory: microservices/payment-service
      - name: Run frontend unit tests
        run: npm test
        working-directory: frontend

  integration:
    name: integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOCKER_BUILDKIT: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Start only the API path (gateway + deps). Skips Prometheus/Grafana/nginx-exporter for speed.
      - name: Start compose stack (gateway and dependencies)
        run: docker compose up -d --build gateway
      - name: Wait for gateway
        run: |
          set -e
          for i in $(seq 1 72); do
            if curl -fsS --connect-timeout 2 --max-time 5 http://localhost:8080/health >/dev/null 2>&1; then
              echo "Gateway healthy after ${i} attempt(s)"
              exit 0
            fi
            if [ $((i % 12)) -eq 0 ]; then
              echo "…still waiting ($i/72, ~$((i * 5))s elapsed)"
              docker compose ps || true
            fi
            sleep 5
          done
          echo "::error::Gateway did not become healthy within ~6 minutes"
          docker compose ps
          docker compose logs --no-color --tail 200 gateway || true
          docker compose logs --no-color --tail 80 product-service || true
          exit 1
      # nginx can answer /health before upstreams accept traffic; avoid flaky 502 on /api/users/*
      - name: Wait for user-service (direct port)
        run: |
          set -e
          for i in $(seq 1 40); do
            if curl -fsS --connect-timeout 2 --max-time 5 http://localhost:8001/health >/dev/null 2>&1; then
              echo "user-service healthy after ${i} attempt(s)"
              exit 0
            fi
            sleep 3
          done
          echo "::error::user-service did not become ready"
          docker compose ps
          docker compose logs --no-color --tail 120 user-service || true
          exit 1
      - name: Run gateway integration flow
        run: RUN_INTEGRATION=true INTEGRATION_BASE_URL=http://localhost:8080 node --test tests/integration/*.test.mjs
      - name: Capture compose diagnostics
        if: always()
        run: |
          mkdir -p artifacts
          docker compose ps > artifacts/compose-ps.txt
          docker compose logs --no-color > artifacts/compose-logs.txt
      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts
          path: artifacts
      - name: Shutdown compose stack
        if: always()
        run: docker compose down -v

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
      - name: Validate compose file
        run: docker compose config >/dev/null
