apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-exporter
  namespace: maker-platform
spec:
  # Set the number of desired replicas for nginx-exporter here
  replicas: 1
  selector:
    matchLabels:
      app: nginx-exporter
  template:
    metadata:
      labels:
        app: nginx-exporter
    spec:
      containers:
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.1.0
          args: ["-nginx.scrape-uri=http://gateway:8080/nginx_status"]
          ports: [{containerPort: 9113}]
          resources:
            requests: {cpu: 25m, memory: 32Mi}
            limits: {cpu: 50m, memory: 64Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-exporter
  namespace: maker-platform
spec:
  selector: {app: nginx-exporter}
  ports: [{port: 9113, targetPort: 9113}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: maker-platform
spec:
  replicas: 0
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports: [{containerPort: 9090}]
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 100m, memory: 64Mi}
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: maker-platform
spec:
  ports: [{port: 9090, targetPort: 9090}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: maker-platform
spec:
  replicas: 0
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.2
          ports: [{containerPort: 3000}]
          env:
            - {name: GF_SECURITY_ADMIN_USER, value: "admin"}
            - {name: GF_SECURITY_ADMIN_PASSWORD, value: "admin"}
            - {name: GF_USERS_ALLOW_SIGN_UP, value: "false"}
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 100m, memory: 64Mi}
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
            - name: grafana-dashboards
              mountPath: /etc/grafana/provisioning/dashboards/dashboard.yml
              subPath: dashboard.yml
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards/bitforge-overview.json
              subPath: bitforge-overview.json
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: maker-platform
spec:
  selector: {app: grafana}
  ports: [{port: 3000, targetPort: 3000}]
---
apiVersion: autoscaling/v2
metadata:
  name: product-service-hpa
  namespace: maker-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-service
  minReplicas: 1
  maxReplicas: 6
  metrics:
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: maker-platform
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-services
  namespace: maker-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [user-service, product-service, cart-service, order-service, payment-service, review-service, forum-service]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-mongo
  namespace: maker-platform
spec:
  podSelector:
    matchLabels:
      app: mongo
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
      ports: [{port: 27017}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-product-cart-to-redis
  namespace: maker-platform
spec:
  podSelector:
    matchLabels:
      app: redis
  ingress:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [product-service, cart-service]
      ports: [{port: 6379}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-order-payment-ipc
  namespace: maker-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [order-service, product-service]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [order-service, payment-service]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-exporter-to-gateway
spec:
  podSelector:
    matchLabels:
      app: gateway
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: nginx-exporter
      ports: [{port: 8080}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: maker-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [user-service, product-service, order-service, payment-service, cart-service, review-service, forum-service, nginx-exporter, prometheus]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
