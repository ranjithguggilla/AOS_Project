apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: maker-platform
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: maker-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports: [{containerPort: 27017}]
          resources:
            requests: {cpu: 200m, memory: 256Mi}
            limits: {cpu: 500m, memory: 512Mi}
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data/db
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mongo-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: maker-platform
spec:
  selector: {app: mongo}
  ports: [{port: 27017, targetPort: 27017}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: maker-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{containerPort: 6379}]
          resources:
            requests: {cpu: 200m, memory: 512Mi}
            limits: {cpu: 500m, memory: 1024Mi}
          readinessProbe:
            exec: {command: ["redis-cli", "ping"]}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: maker-platform
spec:
  selector: {app: redis}
  ports: [{port: 6379, targetPort: 6379}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: maker-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.54
          env: [{name: COLLECTOR_OTLP_ENABLED, value: "true"}]
          ports: [{containerPort: 16686}, {containerPort: 4317}]
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 300m, memory: 512Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: maker-platform
spec:
  selector: {app: jaeger}
  ports:
    - {name: ui, port: 16686, targetPort: 16686}
    - {name: otlp-grpc, port: 4317, targetPort: 4317}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: maker-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          ports: [{containerPort: 4317}, {containerPort: 4318}]
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 300m, memory: 512Mi}
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: maker-platform
spec:
  selector: {app: otel-collector}
  ports:
    - {name: otlp-grpc, port: 4317, targetPort: 4317}
