          readinessProbe: {httpGet: {path: /health, port: 8001}, initialDelaySeconds: 5, periodSeconds: 10}
          livenessProbe: {httpGet: {path: /health, port: 8001}, initialDelaySeconds: 15, periodSeconds: 20}
