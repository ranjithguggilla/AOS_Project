apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: shop-micro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: shop-micro
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: shop-micro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: user-service:latest
          command: ["npm", "run", "micro:user"]
          ports:
            - containerPort: 5001
          envFrom:
            - secretRef:
                name: shop-secrets
            - configMapRef:
              name: shop-config
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: shop-micro
  labels:
    app: user-service
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 5001
      targetPort: 5001
---
