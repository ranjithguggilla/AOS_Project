apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: maker-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: madhu4011/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: maker-config
                  key: USER_MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: maker-secrets
                  key: JWT_SECRET
            - name: SERVICE_TOKEN
              valueFrom:
                configMapKeyRef:
                  name: maker-config
                  key: SERVICE_TOKEN
          resources:
            requests:
              cpu: 20m
              memory: 50Mi
            limits:
              cpu: 150m
              memory: 200Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: maker-platform
spec:
  selector:
    app: user-service
  ports:
    - port: 8001
      targetPort: 8001
---
