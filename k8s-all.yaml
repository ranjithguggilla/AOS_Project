# ================= API GATEWAY =================
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30007
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: Never
          command: ["npm", "run", "micro:gateway"]
          env:
            - name: PORT
              value: "9000"
            - name: USER_SERVICE_URL
              value: http://user-service:5001
            - name: PRODUCT_SERVICE_URL
              value: http://product-service:5002
            - name: CART_SERVICE_URL
              value: http://cart-service:5003
            - name: ORDER_SERVICE_URL
              value: http://order-service:5004
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:5005
            - name: REVIEW_SERVICE_URL
              value: http://review-service:5006
          ports:
            - containerPort: 9000